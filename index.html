<!DOCTYPE html>
<html>
<head>
<title>AI Gia Sư Tin học</title>
<style>
body{font-family:Arial;background:#f0f0f0;}
.chat{width:500px;margin:auto;margin-top:40px;background:white;padding:20px;border-radius:10px;}
#messages{height:300px;border:1px solid #ccc;overflow:auto;padding:10px;margin-bottom:10px;}
input{width:75%;padding:10px;}
button{padding:10px;}
</style>
</head>

<body>

<div class="chat">

<h2>🤖 AI Gia Sư Tin học</h2>

<div id="messages"></div>

<input id="question" placeholder="Hỏi về Tin học...">
<button onclick="ask()">Gửi</button>

</div>

<script>

async function ask(){

let q=document.getElementById("question").value;

let box=document.getElementById("messages");

box.innerHTML+="<p><b>Bạn:</b> "+q+"</p>";

let res=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY"
},

body:JSON.stringify({

model:"gpt-4o-mini",

messages:[
{
role:"system",
content:"Bạn là AI gia sư Tin học, giải thích dễ hiểu cho học sinh."
},
{
role:"user",
content:q
}

]

})

});

let data=await res.json();

let answer=data.choices[0].message.content;

box.innerHTML+="<p><b>AI:</b> "+answer+"</p>";

}

</script>

</body>
</html>
